version: '3.9'

services:
  neo4j:
    image: neo4j:5
    container_name: fedbooksem-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/fedbooksem123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fedbooksem-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fedbooksem-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fedbooksem
      - POSTGRES_USER=fedbooksem
      - POSTGRES_PASSWORD=fedbooksem123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
